<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selectum Spare Parts — Gestion Stock</title>
<style>
:root{--navy:#0a1628;--blue:#1a2d4e;--red:#c62828;--redh:#e53935;--green:#2e7d32;--orange:#e65100;--light:#f0f4f8;--white:#fff;--border:#dde3ea;--text:#1a1a2e;--muted:#6b7a8d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text);min-height:100vh;}

/* Header */
.header{background:var(--navy);color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header .logo{font-size:1.2rem;font-weight:700;letter-spacing:1px;}
.header .logo span{color:var(--red);}
.header-right{display:flex;align-items:center;gap:16px;}
.api-status{font-size:.75rem;padding:4px 10px;border-radius:20px;font-weight:600;}
.api-status.ok{background:#1b5e20;color:#a5d6a7;}
.api-status.err{background:#b71c1c;color:#ffcdd2;}

/* Layout */
.container{max-width:1300px;margin:0 auto;padding:24px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--navy);}
.stat-card.red{border-color:var(--red);}
.stat-card.green{border-color:var(--green);}
.stat-card.orange{border-color:var(--orange);}
.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:2rem;font-weight:700;color:var(--text);}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar input,.toolbar select{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;background:#fff;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--navy);}
.toolbar input{flex:1;min-width:200px;}

/* Boutons */
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--blue);}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:var(--redh);}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.btn-outline:hover{background:var(--navy);color:#fff;}
.btn-sm{padding:5px 12px;font-size:.8rem;}
.btn-icon{padding:6px 10px;font-size:1rem;}

/* Table */
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--navy);color:#fff;}
th{padding:13px 14px;text-align:left;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f7f9fc;}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
.badge-actif{background:#e8f5e9;color:#2e7d32;}
.badge-inactif{background:#fce4ec;color:#c62828;}
.badge-ok{background:#e3f2fd;color:#1565c0;}
.badge-low{background:#fff8e1;color:#f57f17;}
.badge-zero{background:#ffebee;color:#b71c1c;}

/* Stock bar */
.stock-bar{display:flex;align-items:center;gap:8px;}
.bar{height:6px;border-radius:3px;background:#e0e0e0;width:80px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--green);}
.bar-fill.low{background:var(--orange);}
.bar-fill.zero{background:var(--red);}

/* Actions */
.actions{display:flex;gap:6px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{background:var(--navy);color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-size:1.1rem;}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.82rem;font-weight:600;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy);}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px;}

/* Switch actif */
.switch{position:relative;display:inline-block;width:48px;height:26px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:26px;transition:.3s;}
.slider:before{position:absolute;content:'';height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--green);}
input:checked+.slider:before{transform:translateX(22px);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;color:#fff;font-weight:600;z-index:2000;animation:slideUp .3s ease;}
.toast.success{background:#2e7d32;}
.toast.error{background:#c62828;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ico{font-size:3rem;margin-bottom:12px;}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000;}
.confirm-box{background:#fff;border-radius:12px;padding:28px;max-width:380px;width:90%;text-align:center;}
.confirm-box h4{font-size:1.1rem;margin-bottom:10px;}
.confirm-box p{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
.confirm-btns{display:flex;gap:12px;justify-content:center;}

@media(max-width:700px){
  .form-grid{grid-template-columns:1fr;}
  .stats{grid-template-columns:1fr 1fr;}
  th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SELECTUM <span>SPARE PARTS</span> — Gestion Stock</div>
  <div class="header-right">
    <span class="api-status ok" id="apiStatus">● Connecté</span>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total produits</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card green"><div class="stat-label">Actifs</div><div class="stat-value" id="statActif">—</div></div>
    <div class="stat-card orange"><div class="stat-label">Stock faible (&lt;10)</div><div class="stat-value" id="statLow">—</div></div>
    <div class="stat-card red"><div class="stat-label">En rupture</div><div class="stat-value" id="statZero">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 Rechercher par désignation, référence, marque...">
    <select id="filterType">
      <option value="">Tous les types</option>
      <option>Huile</option><option>Air</option><option>Carburant</option>
      <option>Hydraulique</option><option>Habitacle</option><option>Poids Lourds</option>
    </select>
    <select id="filterActif">
      <option value="">Tous statuts</option>
      <option value="1">Actifs</option>
      <option value="0">Inactifs</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">+ Nouveau produit</button>
    <button class="btn btn-outline" onclick="loadProduits()">↻ Actualiser</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Référence</th>
          <th>Désignation</th>
          <th>Type</th>
          <th>Marque</th>
          <th>Compatibilité</th>
          <th>Stock</th>
          <th>Prix (DT)</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" class="loading">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Ajout/Édition -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nouveau produit</h3>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Référence *</label>
          <input type="text" id="fRef" placeholder="ex: UFI-23.100.00">
        </div>
        <div class="form-group">
          <label>Type de filtre *</label>
          <select id="fType">
            <option>Huile</option><option>Air</option><option>Carburant</option>
            <option>Hydraulique</option><option>Habitacle</option><option>Poids Lourds</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Désignation *</label>
          <input type="text" id="fDes" placeholder="ex: Filtre à huile moteur">
        </div>
        <div class="form-group">
          <label>Marque</label>
          <input type="text" id="fMarque" placeholder="ex: UFI Filters">
        </div>
        <div class="form-group">
          <label>Stock (unités) *</label>
          <input type="number" id="fStock" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>Prix (DT) *</label>
          <input type="number" id="fPrix" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group full">
          <label>Compatibilité véhicules</label>
          <input type="text" id="fCompat" placeholder="ex: Renault, Peugeot, Citroën">
        </div>
        <div class="form-group">
          <label>Statut</label>
          <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
            <label class="switch"><input type="checkbox" id="fActif" checked><span class="slider"></span></label>
            <span id="actifLabel" style="font-size:.9rem;color:var(--green);font-weight:600">Actif</span>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="sauvegarder()">💾 Sauvegarder</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmBox" style="display:none">
  <div class="confirm-box">
    <h4>Supprimer ce produit ?</h4>
    <p id="confirmMsg">Cette action est irréversible.</p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="document.getElementById('confirmBox').style.display='none'">Annuler</button>
      <button class="btn btn-red" id="confirmOk">Supprimer</button>
    </div>
  </div>
</div>

<script>
const API = 'https://base44.app/api/apps/6a099d2ff4be45944acde0d0/entities/Filtre';
const TOKEN = 'Bearer ' + (function(){
  // Token de service intégré pour l'accès admin
  return document.currentScript ? document.currentScript.getAttribute('data-token') || '' : '';
})();

// On utilise le endpoint public de la fonction backend
const FUNC_URL = 'https://base44.app/api/apps/6a099d2ff4be45944acde0d0/functions/filtresCrud';

let allProduits = [];
let editId = null;

// ─── Chargement ───────────────────────────────────────────
async function loadProduits() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="loading">Chargement...</td></tr>';
  try {
    const r = await fetch(FUNC_URL + '?action=list');
    const d = await r.json();
    allProduits = d.items || [];
    if (allProduits.length === 0) {
      // Fallback: essayer l'API directe (mode développement)
      await loadFromDirectAPI();
    } else {
      renderTable(allProduits);
      updateStats(allProduits);
      setStatus(true);
    }
  } catch(e) {
    await loadFromDirectAPI();
  }
}

async function loadFromDirectAPI() {
  try {
    const headers = {};
    const r = await fetch(API, { headers });
    if (!r.ok) throw new Error('API error');
    allProduits = await r.json();
    renderTable(allProduits);
    updateStats(allProduits);
    setStatus(true);
  } catch(e) {
    setStatus(false);
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty"><div class="ico">⚠️</div>Impossible de charger les données. Vérifiez votre connexion.</td></tr>';
  }
}

// ─── Rendu table ───────────────────────────────────────────
function renderTable(data) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const typeF = document.getElementById('filterType').value;
  const actifF = document.getElementById('filterActif').value;

  let filtered = data.filter(p => {
    const txt = (p.designation||'')+(p.reference||'')+(p.marque||'');
    if (search && !txt.toLowerCase().includes(search)) return false;
    if (typeF && p.type_filtre !== typeF) return false;
    if (actifF === '1' && !p.actif) return false;
    if (actifF === '0' && p.actif) return false;
    return true;
  });

  if (!filtered.length) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty"><div class="ico">📦</div>Aucun produit trouvé.</td></tr>';
    return;
  }

  document.getElementById('tableBody').innerHTML = filtered.map(p => {
    const stock = Number(p.stock) || 0;
    const maxStock = 100;
    const pct = Math.min(100, (stock/maxStock)*100);
    const barClass = stock === 0 ? 'zero' : stock < 10 ? 'low' : '';
    const stockBadge = stock === 0 ? 'badge-zero' : stock < 10 ? 'badge-low' : 'badge-ok';
    const stockLabel = stock === 0 ? '⚠️ Rupture' : stock < 10 ? `⬇ ${stock}` : stock;
    return `<tr>
      <td><code style="background:#f0f4f8;padding:2px 7px;border-radius:4px;font-size:.8rem">${p.reference||'—'}</code></td>
      <td><strong>${p.designation||'—'}</strong></td>
      <td>${p.type_filtre||'—'}</td>
      <td>${p.marque||'—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.compatibilite||''}">${p.compatibilite||'—'}</td>
      <td>
        <div class="stock-bar">
          <span class="badge ${stockBadge}">${stockLabel}</span>
          <div class="bar"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
        </div>
      </td>
      <td><strong>${Number(p.prix||0).toFixed(2)} DT</strong></td>
      <td><span class="badge ${p.actif ? 'badge-actif':'badge-inactif'}">${p.actif ? '✓ Actif':'✗ Inactif'}</span></td>
      <td>
        <div class="actions">
          <button class="btn btn-sm btn-outline btn-icon" title="Modifier" onclick="editProduit('${p.id}')">✏️</button>
          <button class="btn btn-sm btn-icon" style="background:#fff3e0;border:1.5px solid #e65100;color:#e65100" title="${p.actif?'Désactiver':'Activer'}" onclick="toggleActif('${p.id}',${p.actif})">${p.actif?'⏸':'▶'}</button>
          <button class="btn btn-sm btn-icon" style="background:#ffebee;border:1.5px solid #c62828;color:#c62828" title="Supprimer" onclick="confirmDelete('${p.id}','${(p.designation||'').replace(/'/g,"\\'")}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ─── Stats ─────────────────────────────────────────────────
function updateStats(data) {
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statActif').textContent = data.filter(p=>p.actif).length;
  document.getElementById('statLow').textContent = data.filter(p=>Number(p.stock)>0 && Number(p.stock)<10).length;
  document.getElementById('statZero').textContent = data.filter(p=>Number(p.stock)===0).length;
}

// ─── Filtres live ──────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', ()=>renderTable(allProduits));
document.getElementById('filterType').addEventListener('change', ()=>renderTable(allProduits));
document.getElementById('filterActif').addEventListener('change', ()=>renderTable(allProduits));

// ─── Modal ──────────────────────────────────────────────────
function openModal(data={}) {
  editId = data.id || null;
  document.getElementById('modalTitle').textContent = editId ? 'Modifier le produit' : 'Nouveau produit';
  document.getElementById('fRef').value = data.reference || '';
  document.getElementById('fType').value = data.type_filtre || 'Huile';
  document.getElementById('fDes').value = data.designation || '';
  document.getElementById('fMarque').value = data.marque || '';
  document.getElementById('fStock').value = data.stock !== undefined ? data.stock : '';
  document.getElementById('fPrix').value = data.prix !== undefined ? data.prix : '';
  document.getElementById('fCompat').value = data.compatibilite || '';
  document.getElementById('fActif').checked = data.actif !== undefined ? data.actif : true;
  updateActifLabel();
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function updateActifLabel() {
  const v = document.getElementById('fActif').checked;
  const lbl = document.getElementById('actifLabel');
  lbl.textContent = v ? 'Actif' : 'Inactif';
  lbl.style.color = v ? 'var(--green)' : 'var(--red)';
}
document.getElementById('fActif').addEventListener('change', updateActifLabel);

function editProduit(id) {
  const p = allProduits.find(x=>x.id===id);
  if (p) openModal(p);
}

// ─── Sauvegarde ────────────────────────────────────────────
async function sauvegarder() {
  const payload = {
    reference: document.getElementById('fRef').value.trim(),
    designation: document.getElementById('fDes').value.trim(),
    type_filtre: document.getElementById('fType').value,
    marque: document.getElementById('fMarque').value.trim(),
    stock: parseFloat(document.getElementById('fStock').value) || 0,
    prix: parseFloat(document.getElementById('fPrix').value) || 0,
    compatibilite: document.getElementById('fCompat').value.trim(),
    actif: document.getElementById('fActif').checked,
  };
  if (!payload.reference || !payload.designation) { toast('Référence et désignation obligatoires','error'); return; }

  try {
    let r, url;
    if (editId) {
      url = FUNC_URL + '?action=update&id=' + editId;
    } else {
      url = FUNC_URL + '?action=create';
    }
    r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error||'Erreur');
    toast(editId ? 'Produit mis à jour ✓' : 'Produit créé ✓', 'success');
    closeModal();
    loadProduits();
  } catch(e) {
    // Fallback API directe
    try {
      let r;
      if (editId) {
        r = await fetch(API+'/'+editId, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      } else {
        r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      }
      toast(editId ? 'Produit mis à jour ✓' : 'Produit créé ✓', 'success');
      closeModal();
      loadProduits();
    } catch(e2) {
      toast('Erreur: ' + e2.message, 'error');
    }
  }
}

// ─── Toggle actif ──────────────────────────────────────────
async function toggleActif(id, actuel) {
  try {
    const url = FUNC_URL + '?action=update&id=' + id;
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({actif: !actuel}) });
    const d = await r.json();
    if (!d.ok && d.error) throw new Error(d.error);
    toast(!actuel ? 'Produit activé ✓' : 'Produit désactivé ✓', 'success');
    loadProduits();
  } catch(e) {
    try {
      await fetch(API+'/'+id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({actif:!actuel})});
      toast(!actuel ? 'Produit activé ✓' : 'Produit désactivé ✓', 'success');
      loadProduits();
    } catch(e2){ toast('Erreur', 'error'); }
  }
}

// ─── Suppression ───────────────────────────────────────────
function confirmDelete(id, nom) {
  document.getElementById('confirmMsg').textContent = `Supprimer "${nom}" ? Cette action est irréversible.`;
  document.getElementById('confirmBox').style.display = 'flex';
  document.getElementById('confirmOk').onclick = () => deleteProduit(id);
}
async function deleteProduit(id) {
  document.getElementById('confirmBox').style.display = 'none';
  try {
    const url = FUNC_URL + '?action=delete&id=' + id;
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const d = await r.json();
    if (!d.ok && d.error) throw new Error(d.error);
    toast('Produit supprimé ✓', 'success');
    loadProduits();
  } catch(e) {
    try {
      await fetch(API+'/'+id, {method:'DELETE'});
      toast('Produit supprimé ✓', 'success');
      loadProduits();
    } catch(e2){ toast('Erreur suppression', 'error'); }
  }
}

// ─── Toast ─────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ─── Status ────────────────────────────────────────────────
function setStatus(ok) {
  const el = document.getElementById('apiStatus');
  el.textContent = ok ? '● Connecté' : '● Déconnecté';
  el.className = 'api-status ' + (ok ? 'ok' : 'err');
}

// ─── Init ──────────────────────────────────────────────────
loadProduits();
</script>
</body>
</html>
